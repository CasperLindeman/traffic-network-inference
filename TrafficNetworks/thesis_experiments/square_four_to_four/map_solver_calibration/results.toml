[experiment]
id = "square_four_to_four_map_solver_calibration"
name = "Square four-to-four network MAP solver calibration"
section_label = "subsec:square_map_optimizer_calibration"
table_labels = [
    "tab:square_optimizer_runtime_calibration",
    "tab:square_optimizer_multiseed_calibration",
    "tab:square_map_mse_calibration",
]
figure_labels = [
    "fig:square_map_runtime_objective",
]
subfolders = [
    "optimizer_runtime",
    "optimizer_multiseed",
    "objective_choice",
]
sources = ["run.jl"]

[setup]
parameter_space = "z"
prior = "z ~ N(0, 1.25^2 I)"
optimizer_budget_seconds = 300
objective_floor_fraction = 0.15
gradient_method = "automatic differentiation through the implemented objective"
purpose = "choose a sufficiently reliable MAP optimizer and objective for later square-network comparisons"

[optimizer_runtime]
source_folder = "optimizer_runtime"
metrics = "optimizer_runtime/outputs/optimizer_runtime_metrics.tsv"
figure = "optimizer_runtime/figures/square_map_runtime_objective.png"

