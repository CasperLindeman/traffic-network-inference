[experiment]
id = "square_four_to_four_data_amount_and_esmda_budget"
name = "Square four-to-four network data amount and ESMDA budget"
figure_labels = [
    "fig:square_data_amount_summary",
    "fig:square_compute_cost_summary",
]
sources = [
    "run.jl",
    "plots.jl",
    "sources/generate_data_budget_results.jl",
    "sources/plot_data_budget_figures.jl",
]

[setup]
seeds = 5
seed_values = [1, 2, 3, 4, 5]
physical_peak_noise_sigma = 0.08
sigma_floor_fraction = 0.03
prior_scale = 1.25
observed_road_count = 9
sensors_per_observed_road = 4
base_saved_times_per_scenario = 8
base_observation_count = 288

[setup.reference_budget]
ensemble_members = 192
assimilation_steps = 6
forward_runs = 1152

