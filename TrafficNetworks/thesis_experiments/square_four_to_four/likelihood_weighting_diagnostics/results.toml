[experiment]
id = "square_four_to_four_likelihood_weighting_diagnostics"
name = "Square four-to-four network likelihood weighting diagnostics"
figure_labels = [
    "fig:square_turning_row_swap_fit",
    "fig:square_likelihood_floor_comparison",
]
sources = [
    "run.jl",
    "plots.jl",
    "sources/likelihood_floor_comparison.jl",
    "sources/data_budget_context.jl",
    "sources/turning_recovery_diagnostics.jl",
]

[setup.row_replacement]
scenario_count = 12
horizon_factor = 1
observation_count = 3456
ensemble_members = 192
assimilation_steps = 6
seed = 1
observation_seed = 1
esmda_seed = 100001
physical_peak_noise_sigma = 0.08
sigma_floor_fraction = 0.03
prior_scale = 1.25

[setup.floor_comparison]
scenario_count = 12
horizon_factor = 1
observation_count = 3456
ensemble_members = 192
assimilation_steps = 6
seeds = [1, 2, 3]
floor_fractions = [0.03, 0.10, 0.15]

