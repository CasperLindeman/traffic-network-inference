name = "two_to_two"

[simulation]
cfl = 0.5
control_step_seconds = 15
horizon_minutes = 5.0

[discretization]
mode = "blocks"
basis_length_km = 0.25
cells_per_block = 6

[observations]
road_ids = [1, 2, 3, 4]
paired_cell_fractions = [0.85, 0.85, 0.20, 0.20]

[[roads]]
id = 1
label = "Incoming road 1"
blocks = 3
speed_limit = 70
[roads.profile]
type = "piecewise"
default = 0.26
scale = "blocks"
segments = [
    [0.00, 0.30, 0.20],
    [0.30, 0.65, 0.28],
    [0.65, 1.00, 0.46],
]

[[roads]]
id = 2
